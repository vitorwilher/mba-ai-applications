    <circle cx="192" cy="150" r="5"/><circle cx="240" cy="158" r="5"/><circle cx="288" cy="110" r="5"/>
  </g>
  <circle cx="336" cy="70" r="7" fill="#18a0d7" stroke="#fff" stroke-width="3"/>
