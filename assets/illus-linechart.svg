      <stop offset="0%" stop-color="#56c2ec" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#56c2ec" stop-opacity="0.05"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="400" height="280" rx="16" fill="#f3f7fb"/>
  <!-- eixos -->
  <line x1="48" y1="40" x2="48" y2="232" stroke="#c4d3e2" stroke-width="2"/>
  <line x1="48" y1="232" x2="364" y2="232" stroke="#c4d3e2" stroke-width="2"/>
