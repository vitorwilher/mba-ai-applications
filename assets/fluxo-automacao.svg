<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 400" font-family="Inter, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1c2d4f"/>
    </marker>
    <clipPath id="b1"><rect x="80"  y="170" width="290" height="120" rx="14"/></clipPath>
    <clipPath id="b2"><rect x="410" y="170" width="290" height="120" rx="14"/></clipPath>
    <clipPath id="b3"><rect x="740" y="170" width="290" height="120" rx="14"/></clipPath>
  </defs>

  <!-- ===== Orquestrador: GitHub Actions ===== -->
  <rect x="40" y="34" width="1320" height="78" rx="16" fill="#1c2d4f"/>
  <text x="700" y="68" text-anchor="middle" fill="#ffffff" font-size="22" font-weight="800">GitHub Actions — automatiza o projeto</text>
  <text x="700" y="95" text-anchor="middle" fill="#9fd6f2" font-size="15">cron: toda segunda, 8h · roda na nuvem (sem servidor, sem sua máquina ligada)</text>

  <!-- seta para baixo, do orquestrador para a pipeline -->
  <line x1="700" y1="112" x2="700" y2="158" stroke="#1c2d4f" stroke-width="3" marker-end="url(#ar)"/>
  <text x="84" y="152" fill="#1c2d4f" font-size="15" font-weight="700">main.py orquestra:</text>

  <!-- ===== Pipeline ===== -->
  <!-- B1 Coleta -->
  <rect x="80" y="170" width="290" height="120" rx="14" fill="#ffffff" stroke="#18a0d7" stroke-width="3"/>
  <rect x="80" y="170" width="290" height="40" fill="#18a0d7" clip-path="url(#b1)"/>
  <text x="225" y="196" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="700">1 · COLETA</text>
  <text x="225" y="240" text-anchor="middle" fill="#16233d" font-size="16" font-weight="700">coleta.py</text>
  <text x="225" y="266" text-anchor="middle" fill="#16233d" font-size="14">dados da semana</text>

  <!-- B2 Resumo LLM -->
  <rect x="410" y="170" width="290" height="120" rx="14" fill="#ffffff" stroke="#18a0d7" stroke-width="3"/>
  <rect x="410" y="170" width="290" height="40" fill="#18a0d7" clip-path="url(#b2)"/>
  <text x="555" y="196" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="700">2 · RESUMO (LLM)</text>
  <text x="555" y="240" text-anchor="middle" fill="#16233d" font-size="16" font-weight="700">resumo.py</text>
  <text x="555" y="266" text-anchor="middle" fill="#16233d" font-size="14">saída estruturada</text>

  <!-- B3 Envio WhatsApp -->
  <rect x="740" y="170" width="290" height="120" rx="14" fill="#ffffff" stroke="#1aa851" stroke-width="3"/>
  <rect x="740" y="170" width="290" height="40" fill="#1aa851" clip-path="url(#b3)"/>
  <text x="885" y="196" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="700">3 · ENVIO</text>
  <text x="885" y="240" text-anchor="middle" fill="#16233d" font-size="16" font-weight="700">whatsapp.py</text>
  <text x="885" y="266" text-anchor="middle" fill="#16233d" font-size="14">Meta Cloud API</text>

  <!-- Resultado: celular -->
  <rect x="1090" y="170" width="230" height="120" rx="18" fill="#eafaf0" stroke="#1aa851" stroke-width="3"/>
  <circle cx="1150" cy="230" r="20" fill="#1aa851"/>
  <path d="M1141,230 l6,7 l13,-15" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="1245" y="226" text-anchor="middle" fill="#16233d" font-size="15" font-weight="700">Relatório</text>
  <text x="1245" y="248" text-anchor="middle" fill="#16233d" font-size="15" font-weight="700">no WhatsApp</text>

  <!-- setas da pipeline -->
  <line x1="372" y1="230" x2="406" y2="230" stroke="#1c2d4f" stroke-width="3" marker-end="url(#ar)"/>
  <line x1="702" y1="230" x2="736" y2="230" stroke="#1c2d4f" stroke-width="3" marker-end="url(#ar)"/>
  <line x1="1032" y1="230" x2="1086" y2="230" stroke="#1c2d4f" stroke-width="3" marker-end="url(#ar)"/>

  <!-- loop semanal de volta ao orquestrador -->
  <path d="M1205,292 L1205,350 L150,350 L150,116" fill="none" stroke="#18a0d7" stroke-width="3" stroke-dasharray="7 6" marker-end="url(#ar)"/>
  <text x="690" y="343" text-anchor="middle" fill="#18a0d7" font-size="15" font-weight="700">repete toda semana, sozinho</text>
</svg>
